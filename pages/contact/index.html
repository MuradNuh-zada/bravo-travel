<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./contact.css" />
    <title>Contact</title>
  </head>
  <body>
    <header>
      <div class="container">
        <div class="head">
          <nav>
            <a href="../../index.html" class="logo">
              <img src="https://bravotravel.az/img/logo-new-white.png" alt="" />
            </a>
            <ul class="header-list">
              <li>
                <a href="../about">
                  <span> Haqqımızda </span>
                </a>
              </li>
              <li>
                <a href="#">
                  <span>Yeni turlar</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <span>Xidmətlər</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <span>Azərbaycan turları</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <span>Korporativ əməkdaşlıq</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <span>Əlaqə</span>
                </a>
              </li>
            </ul>
          </nav>
          <div class="menu">
            <button class="search-logo">
              <img
                src="https://bravotravel.az/img/search.png"
                alt="search-logo"
              />
            </button>
            <div class="drop-down">
              <button href="#" class="lang-dropdown">
                <div class="choose-lang">
                  <img
                    src="https://bravotravel.az/img/azerbaijan.png"
                    alt="AZ-lang"
                  />
                  <span>AZ</span>
                </div>
                <div class="drop-lang">
                  <a href="#" class="drop-rus">
                    <img
                      src="https://bravotravel.az/img/russia.png"
                      alt="RU-lang"
                    />
                    <span>RU</span>
                  </a>
                  <a href="#" class="drop-eng">
                    <img
                      src="https://bravotravel.az/img/united-kingdom.png"
                      alt="EN-lang"
                    />
                    <span>EN</span>
                  </a>
                </div>
              </button>
            </div>
            <a href="tel:+99450 603 77 77" class="call-link">
              <img
                src="https://bravotravel.az/img/callcolor.png"
                alt="call-logo"
              />
              <span>(+99450) 603 77 77</span>
            </a>
          </div>
        </div>
      </div>
      <img src="https://bravotravel.az/img/cloud4.png" class="cloud" />
    </header>
    <iframe
      src="https://yandex.com/map-widget/v1/?um=constructor%3Ac4d3b99048248299885c19ce1c12726fffc8ec5ab090e57154c669b33750c770&amp;source=constructor"
      width="100%"
      height="400"
      frameborder="0"
    ></iframe>

    <section id="contact">
      <div class="container">
        <div id="contact-info">
          <article id="location">
            <p>
              Azadlıq pr. 95/12, Bakı. <br />
              Koala parkın yaxınlığı
            </p>
          </article>
          <article id="number">
            <p>Mobil nömrə: (+99450) 603 77 77</p>
          </article>
          <article id="work-hours">
            <p>
              İş saatları: 10:00 - 18:00 (I - V günlər) <br />
              İş saatları: 10:00 - 14:00 (VI günlər)
            </p>
          </article>
          <article id="lady-image">
            <img
              src="https://bravotravel.az/img/office-img.jpg"
              alt="Lady image"
            />
          </article>
        </div>
      </div>
    </section>

    <section id="contact-form">
      <div class="container">
        <div class="contact">
          <div class="contact-head">
            <img src="https://bravotravel.az/img/palm.png" alt="Palm image" />
            <h3>Əlaqə formu</h3>
          </div>
          <div class="line"></div>
          <form action="">
            <div class="name-number">
              <div class="input-box">
                <label for="full-name">Ad, Soyad</label>
                <div class="focus-bg">
                  <input type="text" name="full-name" />
                </div>
              </div>
              <div class="input-box">
                <label for="number">Telefon nömrəniz</label>
                <div class="focus-bg">
                  <input type="number" name="number" />
                </div>
              </div>
            </div>
            <div class="message">
              <label for="message">Mesajınız</label>
              <div class="focus-bg">
                <textarea rows="7" name="message" id="message"></textarea>
              </div>
            </div>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
